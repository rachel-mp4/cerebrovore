{{define "left-sidebar"}}
  <div class="sidebar-group">
    <div>
      <a href="/">go home</a>
    </div>
    <div>
      <a href="/t">view index</a>
    </div>
    <div>
      <a style="letter-spacing:-0.25px" href="/ft">view forums</a>
    </div>
    <div>
      <a style="letter-spacing:0.25px" href="/catalog">view catalog</a>
    </div>
    <div>
      <a href="/profile/{{.Username}}">view my profile</a>
    </div>
    <div>
      <a href="/settings">view my settings</a>
    </div>
    <div>
      <a href="/new">create a new thread</a>
    </div>
    {{if .IsMod}}
      <div>
        <a href="/moderate">view moderation panel</a>
      </div>
    {{end}}
  </div>
  <div class="sidebar-group" id="watched-threads">
    <div><button class="recent-activity clickable">watched threads</button></div>
  </div>
  <div class="sidebar-group" id="bumped-threads">
    {{template "bumped-threads" .}}
  </div>
  {{if .CompiledAssets}}
    <script type="module" src="/{{.CompiledAssets.WatcherPath}}"></script>
    {{range .CompiledAssets.WatcherCss}}
      <link rel="stylesheet" href="/{{.}}">
    {{end}}
  {{else}}
    <script type="module" src="http://localhost:5173/src/watcher.ts"></script>
  {{end}}
{{end}}
